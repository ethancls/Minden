services:
  postgres:
    image: postgres:latest
    container_name: minden_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: minden_dev
      POSTGRES_USER: minden_user
      POSTGRES_PASSWORD: minden_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minden_user -d minden_dev"]
      interval: 30s
      timeout: 10s
      retries: 3

  adminer:
    image: adminer
    container_name: minden_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
