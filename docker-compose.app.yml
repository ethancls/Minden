# Docker Compose for Minden App Testing
# This file allows you to test the built containers with the database

services:
  postgres:
    image: postgres:latest
    container_name: minden_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: minden_dev
      POSTGRES_USER: minden_user
      POSTGRES_PASSWORD: minden_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minden_user -d minden_dev"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Development container
  minden-dev:
    image: minden:dev
    container_name: minden_dev
    ports:
      - "3000:3000"
      - "4983:4983"  # Drizzle Studio
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://minden_user:minden_password@postgres:5432/minden_dev
      - SKIP_ENV_VALIDATION=true
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev

  # Production container
  minden-prod:
    image: minden:prod
    container_name: minden_prod
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://minden_user:minden_password@postgres:5432/minden_dev
      - SKIP_ENV_VALIDATION=true
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - prod

  adminer:
    image: adminer
    container_name: minden_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data: