# docker-compose.dev.yml - Environnement de développement complet
version: '3.8'

services:
  # Application Next.js
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      # Montage du code source pour le hot reload
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      # Variables d'environnement pour le développement
      - NODE_ENV=development
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=dev-secret-key-change-in-production
      - DATABASE_URL=postgresql://minden:minden123@postgres:5432/minden_dev
    depends_on:
      - postgres
    restart: unless-stopped
    stdin_open: true
    tty: true

  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: minden_dev
      POSTGRES_USER: minden
      POSTGRES_PASSWORD: minden123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script d'initialisation optionnel
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  # Interface d'administration PostgreSQL (optionnel)
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@minden.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
    profiles:
      - tools

volumes:
  postgres_data:

networks:
  default:
    driver: bridge
